name: Windows Build

on:
  push:
    branches: [main, master, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NeuralAmpModelerCore is public — init normally.
      - name: Init NeuralAmpModelerCore submodule
        run: git submodule update --init --recursive ThirdParty/NeuralAmpModelerCore

      # ASIOSDK is a private repo (build-deps). GITHUB_TOKEN is scoped to this
      # repo only and cannot clone other repos — use a PAT stored as a secret.
      # Secret name: BUILD_DEPS_TOKEN  (repo secret in NeuralStage settings)
      - name: Init ASIOSDK submodule
        env:
          TOKEN: ${{ secrets.BUILD_DEPS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init ThirdParty/ASIOSDK
          git config --global --unset url."https://x-access-token:${TOKEN}@github.com/".insteadOf

      # ilammy/msvc-dev-cmd sets up the MSVC compiler environment so CMake
      # can find cl.exe without needing to detect a Visual Studio installation.
      # Using Ninja instead of the VS generator avoids vswhere registry lookups
      # that fail on the windows-latest runner image.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -S . -B Builds -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build Builds --parallel

      - name: Read version from CMakeLists
        id: ver
        shell: pwsh
        run: |
          $ver = (Select-String -Path CMakeLists.txt -Pattern 'project\(NeuralStage VERSION ([0-9.]+)').Matches.Groups[1].Value
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      # Ninja is a single-config generator: no Release\ subdirectory in the paths.
      - name: Stage binaries
        shell: pwsh
        run: |
          $ver    = "${{ steps.ver.outputs.version }}"
          $binDir = "Installer\Binaries"
          if (Test-Path $binDir) { Remove-Item $binDir -Recurse -Force }
          New-Item -ItemType Directory -Path $binDir | Out-Null

          $exeSrc  = "Builds\NeuralStage_artefacts\NeuralStage.v.$ver.exe"
          $vst3Src = "Builds\NeuralStagePlugin_artefacts\VST3\NeuralStage.vst3"
          $clapSrc = "Builds\NeuralStagePlugin_artefacts\CLAP\NeuralStage.v.$ver.clap"

          foreach ($p in @($exeSrc, $vst3Src, $clapSrc)) {
            if (-not (Test-Path $p)) {
              Write-Error "Build output missing: $p"
              Write-Host "Actual artefacts found:"
              Get-ChildItem "Builds" -Recurse -Include "*.exe","*.vst3","*.clap" | Select-Object FullName
              exit 1
            }
          }

          Copy-Item $exeSrc  "$binDir\NeuralStage.exe"
          Copy-Item $vst3Src "$binDir\NeuralStage.vst3" -Recurse
          Copy-Item $clapSrc "$binDir\NeuralStage.clap"

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress -y | Out-Null
          }
          & $iscc Installer\NeuralStage.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Package release zips
        id: zips
        shell: pwsh
        run: |
          $tag    = "${{ github.ref_name }}"
          $binDir = "Installer\Binaries"

          New-Item -ItemType Directory -Force -Path zips | Out-Null

          # Manual install zip (exe + vst3 + clap — no installer required)
          $manualDir = "zips\_manual"
          New-Item -ItemType Directory -Force -Path $manualDir | Out-Null
          Copy-Item "$binDir\NeuralStage.exe"  "$manualDir\"
          Copy-Item "$binDir\NeuralStage.vst3" "$manualDir\" -Recurse
          Copy-Item "$binDir\NeuralStage.clap" "$manualDir\"
          Compress-Archive -Path "$manualDir\*" `
            -DestinationPath "zips\NeuralStage-$tag-Windows-x64-Manual.zip"
          Remove-Item $manualDir -Recurse -Force

          # Installer zip
          $setupExe = Get-ChildItem "Installer\Output" -Filter "*.exe" | Select-Object -First 1
          Compress-Archive -Path $setupExe.FullName `
            -DestinationPath "zips\NeuralStage-$tag-Windows-x64-Setup.zip"

          Get-ChildItem zips | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Windows-x64-r${{ github.run_number }}
          path: zips/
          retention-days: 30
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          files: zips/*.zip
