name: macOS Build

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS Universal (Apple Silicon + Intel)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ASIO is Windows-only — only init NeuralAmpModelerCore.
      - name: Init NeuralAmpModelerCore submodule
        run: git submodule update --init --recursive ThirdParty/NeuralAmpModelerCore

      # Use the Xcode generator — it handles Universal Binary (arm64;x86_64)
      # natively and avoids the Ninja + multi-arch configure-time issues that
      # cause JUCE to silently produce zero build artefacts.
      - name: Configure (Universal Binary arm64 + x86_64)
        run: |
          cmake -S . -B Builds \
            -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build
        run: cmake --build Builds --config Release -- -jobs $(sysctl -n hw.logicalcpu)

      - name: Locate artifacts
        id: find
        run: |
          APP=$(find  Builds -name "NeuralStage.app"    -type d 2>/dev/null | head -1)
          VST3=$(find Builds -name "NeuralStage.vst3"   -type d 2>/dev/null | head -1)
          CLAP=$(find Builds -name "NeuralStage.*.clap"          2>/dev/null | head -1)

          if [ -z "$APP" ]; then
            echo "::error::NeuralStage.app not found — build tree:"
            find Builds -maxdepth 4 -type d | grep -v CMakeFiles | grep -v "\.build" | head -40 || true
            exit 1
          fi

          echo "app=$APP"   >> "$GITHUB_OUTPUT"
          echo "vst3=$VST3" >> "$GITHUB_OUTPUT"
          echo "clap=$CLAP" >> "$GITHUB_OUTPUT"

      - name: Verify Universal Binary
        run: |
          APP="${{ steps.find.outputs.app }}"
          BIN="$APP/Contents/MacOS/NeuralStage"
          echo "app path : $APP"
          echo "Architectures in $BIN:"
          lipo -info "$BIN"

      - name: Package release zips
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p zips

          APP="${{ steps.find.outputs.app }}"
          VST3="${{ steps.find.outputs.vst3 }}"
          CLAP="${{ steps.find.outputs.clap }}"

          (cd "$(dirname "$APP")"  && zip -r "$OLDPWD/zips/NeuralStage-${TAG}-macOS-Universal-Standalone.zip" "$(basename "$APP")")
          (cd "$(dirname "$VST3")" && zip -r "$OLDPWD/zips/NeuralStage-${TAG}-macOS-Universal-VST3.zip"       "$(basename "$VST3")")
          zip "zips/NeuralStage-${TAG}-macOS-Universal-CLAP.zip" "$CLAP"

          ls -lh zips/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-macOS-Universal-r${{ github.run_number }}
          path: zips/
          retention-days: 30
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          files: zips/*.zip
