name: macOS Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS (Universal — arm64 + x86_64)
    runs-on: macos-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set build date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: brew install ninja

      - name: Configure
        run: |
          cmake -S . -B Builds/Mac \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"

      - name: Build
        run: cmake --build Builds/Mac --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Locate artifacts
        id: find
        run: |
          echo "=== Searching for build outputs ==="
          find Builds/Mac -name "*.app" -type d 2>/dev/null
          find Builds/Mac -name "*.vst3" -type d 2>/dev/null
          find Builds/Mac -name "*.clap" 2>/dev/null

          APP=$(find Builds/Mac -name "*.app" -type d 2>/dev/null | head -1)
          VST3=$(find Builds/Mac -name "*.vst3" -type d 2>/dev/null | head -1)
          CLAP=$(find Builds/Mac -name "*.clap" 2>/dev/null | head -1)

          echo "app=$APP"
          echo "vst3=$VST3"
          echo "clap=$CLAP"
          echo "app=$APP"   >> "$GITHUB_OUTPUT"
          echo "vst3=$VST3" >> "$GITHUB_OUTPUT"
          echo "clap=$CLAP" >> "$GITHUB_OUTPUT"

          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found — build may have failed"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent \
            "$APP" "NeuralStage-${{ steps.date.outputs.date }}-mac.zip"

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-macOS-App-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: NeuralStage-${{ steps.date.outputs.date }}-mac.zip
          retention-days: 30
          if-no-files-found: warn

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-macOS-VST3-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: ${{ steps.find.outputs.vst3 }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload CLAP
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-macOS-CLAP-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: ${{ steps.find.outputs.clap }}
          retention-days: 30
          if-no-files-found: warn
