name: Linux Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  #  x86_64 — standard desktop / server Linux
  # ============================================================================
  build-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set build date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build build-essential pkg-config git \
            libasound2-dev libjack-jackd2-dev \
            libfreetype6-dev libfontconfig1-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxcomposite-dev libxext-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            imagemagick

      - name: Configure
        run: |
          cmake -S . -B Builds/Linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build Builds/Linux --config Release --parallel $(nproc)

      - name: Locate artifacts
        id: find
        run: |
          EXE=$(find Builds/Linux -maxdepth 4 -type f -name "NeuralStage.v.*" \
                ! -name "*.so" ! -name "*.clap" 2>/dev/null | head -1)
          VST3=$(find Builds/Linux -maxdepth 5 -type d -name "NeuralStage.vst3" 2>/dev/null | head -1)
          echo "exe=$EXE"
          echo "vst3=$VST3"
          echo "exe=$EXE"  >> "$GITHUB_OUTPUT"
          echo "vst3=$VST3" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        run: |
          EXE="${{ steps.find.outputs.exe }}"
          echo "Bundling: $EXE"

          cp "$EXE" ./NeuralStage

          # Resize icon — name MUST match Icon= entry in the .desktop file
          convert Assets/icon.png -resize 512x512 NeuralStage.png

          {
            echo '[Desktop Entry]'
            echo 'Name=NeuralStage'
            echo 'Exec=NeuralStage'
            echo 'Icon=NeuralStage'
            echo 'Type=Application'
            echo 'Categories=AudioVideo;Audio;Music;'
            echo 'Comment=4-NAM XY morph guitar rig host'
          } > NeuralStage.desktop

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable ./NeuralStage \
            --desktop-file NeuralStage.desktop \
            --icon-file NeuralStage.png \
            --output appimage

          # Rename with build date so every download has a unique, identifiable filename
          mv NeuralStage-x86_64.AppImage "NeuralStage-${{ steps.date.outputs.date }}-x86_64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-x86_64-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: NeuralStage-${{ steps.date.outputs.date }}-x86_64.AppImage
          retention-days: 30
          if-no-files-found: warn

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-x86_64-VST3-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: ${{ steps.find.outputs.vst3 }}
          retention-days: 30
          if-no-files-found: warn

  # ============================================================================
  #  ARM64 — Raspberry Pi 5 / other aarch64 Linux hardware
  # ============================================================================
  build-arm64:
    name: Linux ARM64 (Raspberry Pi 5)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set build date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build build-essential pkg-config git \
            libasound2-dev libjack-jackd2-dev \
            libfreetype6-dev libfontconfig1-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxcomposite-dev libxext-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            imagemagick

      - name: Configure
        run: |
          cmake -S . -B Builds/Linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build Builds/Linux --config Release --parallel $(nproc)

      - name: Locate artifacts
        id: find
        run: |
          EXE=$(find Builds/Linux -maxdepth 4 -type f -name "NeuralStage.v.*" \
                ! -name "*.so" ! -name "*.clap" 2>/dev/null | head -1)
          VST3=$(find Builds/Linux -maxdepth 5 -type d -name "NeuralStage.vst3" 2>/dev/null | head -1)
          echo "exe=$EXE" >> "$GITHUB_OUTPUT"
          echo "vst3=$VST3" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        run: |
          EXE="${{ steps.find.outputs.exe }}"
          echo "Bundling: $EXE"

          cp "$EXE" ./NeuralStage

          # Resize icon — name MUST match Icon= entry in the .desktop file
          convert Assets/icon.png -resize 512x512 NeuralStage.png

          {
            echo '[Desktop Entry]'
            echo 'Name=NeuralStage'
            echo 'Exec=NeuralStage'
            echo 'Icon=NeuralStage'
            echo 'Type=Application'
            echo 'Categories=AudioVideo;Audio;Music;'
            echo 'Comment=4-NAM XY morph guitar rig host'
          } > NeuralStage.desktop

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage"
          chmod +x linuxdeploy-aarch64.AppImage

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-aarch64.AppImage \
            --appdir AppDir \
            --executable ./NeuralStage \
            --desktop-file NeuralStage.desktop \
            --icon-file NeuralStage.png \
            --output appimage

          mv NeuralStage-aarch64.AppImage "NeuralStage-${{ steps.date.outputs.date }}-aarch64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-ARM64-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: NeuralStage-${{ steps.date.outputs.date }}-aarch64.AppImage
          retention-days: 30
          if-no-files-found: warn

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-ARM64-VST3-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: ${{ steps.find.outputs.vst3 }}
          retention-days: 30
          if-no-files-found: warn
