name: Linux Build

on:
  push:
    branches: [main, master, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  #  x86_64 — standard desktop / server Linux
  # ============================================================================
  build-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ASIO SDK is a private Windows-only submodule — not needed for Linux builds.
      # Only init NeuralAmpModelerCore (and its own sub-dependencies).
      - name: Init NeuralAmpModelerCore submodule
        run: git submodule update --init --recursive ThirdParty/NeuralAmpModelerCore

      - name: Set build date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build build-essential pkg-config git \
            libasound2-dev libjack-jackd2-dev \
            libfreetype6-dev libfontconfig1-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxcomposite-dev libxext-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            imagemagick

      - name: Configure
        run: |
          cmake -S . -B Builds/Linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build Builds/Linux --config Release --parallel $(nproc)

      - name: Locate artifacts
        id: find
        run: |
          EXE=$(find Builds/Linux -maxdepth 4 -type f -name "NeuralStage.v.*" \
                ! -name "*.so" ! -name "*.clap" 2>/dev/null | head -1)
          VST3=$(find Builds/Linux -maxdepth 5 -type d -name "NeuralStage.vst3" 2>/dev/null | head -1)
          echo "exe=$EXE"
          echo "vst3=$VST3"
          echo "exe=$EXE"  >> "$GITHUB_OUTPUT"
          echo "vst3=$VST3" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        run: |
          EXE="${{ steps.find.outputs.exe }}"
          echo "Bundling: $EXE"

          cp "$EXE" ./NeuralStage

          # Resize icon — name MUST match Icon= entry in the .desktop file
          convert Assets/icon.png -resize 512x512 NeuralStage.png

          {
            echo '[Desktop Entry]'
            echo 'Name=NeuralStage'
            echo 'Exec=NeuralStage'
            echo 'Icon=NeuralStage'
            echo 'Type=Application'
            echo 'Categories=AudioVideo;Audio;Music;'
            echo 'Comment=4-NAM XY morph guitar rig host'
          } > NeuralStage.desktop

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable ./NeuralStage \
            --desktop-file NeuralStage.desktop \
            --icon-file NeuralStage.png \
            --output appimage

          # Strip audio-system libraries from the bundle: JACK, ALSA, and
          # PipeWire must match the version running on the target system.
          # Bundling them causes JACK IPC/shared-memory protocol mismatches
          # (e.g. jack_port_register() returns null → SIGSEGV on first callback).
          # The dynamic linker falls back to the system-installed versions.
          find AppDir -name "libjack*.so*"      -delete 2>/dev/null || true
          find AppDir -name "libasound*.so*"    -delete 2>/dev/null || true
          find AppDir -name "libpipewire*.so*"  -delete 2>/dev/null || true

          # Rename with build date so every download has a unique, identifiable filename
          mv NeuralStage-x86_64.AppImage "NeuralStage-${{ steps.date.outputs.date }}-x86_64.AppImage"

      - name: Package artifacts as zips
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p zips

          # Standalone
          EXE="${{ steps.find.outputs.exe }}"
          zip "zips/NeuralStage-${TAG}-Linux-x86_64-Standalone.zip" "$EXE"

          # AppImage
          zip "zips/NeuralStage-${TAG}-Linux-x86_64-AppImage.zip" \
              "NeuralStage-${{ steps.date.outputs.date }}-x86_64.AppImage"

          # VST3 (directory)
          VST3="${{ steps.find.outputs.vst3 }}"
          (cd "$(dirname "$VST3")" && \
           zip -r "$OLDPWD/zips/NeuralStage-${TAG}-Linux-x86_64-VST3.zip" \
               "$(basename "$VST3")")

      - name: Upload Standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-x86_64-Standalone-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: ${{ steps.find.outputs.exe }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-x86_64-AppImage-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: NeuralStage-${{ steps.date.outputs.date }}-x86_64.AppImage
          retention-days: 30
          if-no-files-found: warn

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-x86_64-VST3-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: ${{ steps.find.outputs.vst3 }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload release zips artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-zips-x86_64
          path: zips/
          retention-days: 7

  # ============================================================================
  #  ARM64 — Raspberry Pi 5 / other aarch64 Linux hardware
  # ============================================================================
  build-arm64:
    name: Linux ARM64 (Raspberry Pi 5)
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ASIO SDK is a private Windows-only submodule — not needed for Linux builds.
      - name: Init NeuralAmpModelerCore submodule
        run: git submodule update --init --recursive ThirdParty/NeuralAmpModelerCore

      - name: Set build date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build build-essential pkg-config git \
            gcc-12 g++-12 \
            libasound2-dev libjack-jackd2-dev \
            libfreetype6-dev libfontconfig1-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxcomposite-dev libxext-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            imagemagick

      - name: Configure
        run: |
          cmake -S . -B Builds/Linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12

      - name: Build
        run: cmake --build Builds/Linux --config Release --parallel $(nproc)

      - name: Locate artifacts
        id: find
        run: |
          EXE=$(find Builds/Linux -maxdepth 4 -type f -name "NeuralStage.v.*" \
                ! -name "*.so" ! -name "*.clap" 2>/dev/null | head -1)
          VST3=$(find Builds/Linux -maxdepth 5 -type d -name "NeuralStage.vst3" 2>/dev/null | head -1)
          echo "exe=$EXE" >> "$GITHUB_OUTPUT"
          echo "vst3=$VST3" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        run: |
          EXE="${{ steps.find.outputs.exe }}"
          echo "Bundling: $EXE"

          cp "$EXE" ./NeuralStage

          # Resize icon — name MUST match Icon= entry in the .desktop file
          convert Assets/icon.png -resize 512x512 NeuralStage.png

          {
            echo '[Desktop Entry]'
            echo 'Name=NeuralStage'
            echo 'Exec=NeuralStage'
            echo 'Icon=NeuralStage'
            echo 'Type=Application'
            echo 'Categories=AudioVideo;Audio;Music;'
            echo 'Comment=4-NAM XY morph guitar rig host'
          } > NeuralStage.desktop

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage"
          chmod +x linuxdeploy-aarch64.AppImage

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-aarch64.AppImage \
            --appdir AppDir \
            --executable ./NeuralStage \
            --desktop-file NeuralStage.desktop \
            --icon-file NeuralStage.png \
            --output appimage

          # Strip audio-system libraries — same reason as x86_64:
          # JACK/ALSA/PipeWire libraries must come from the target system.
          # On Patchbox OS (Raspberry Pi), a bundled libjack causes IPC
          # protocol mismatches with the running jackd server → SIGSEGV.
          find AppDir -name "libjack*.so*"      -delete 2>/dev/null || true
          find AppDir -name "libasound*.so*"    -delete 2>/dev/null || true
          find AppDir -name "libpipewire*.so*"  -delete 2>/dev/null || true

          mv NeuralStage-aarch64.AppImage "NeuralStage-${{ steps.date.outputs.date }}-aarch64.AppImage"

      - name: Package artifacts as zips
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p zips

          EXE="${{ steps.find.outputs.exe }}"
          zip "zips/NeuralStage-${TAG}-Linux-ARM64-Standalone.zip" "$EXE"

          zip "zips/NeuralStage-${TAG}-Linux-ARM64-AppImage.zip" \
              "NeuralStage-${{ steps.date.outputs.date }}-aarch64.AppImage"

          VST3="${{ steps.find.outputs.vst3 }}"
          (cd "$(dirname "$VST3")" && \
           zip -r "$OLDPWD/zips/NeuralStage-${TAG}-Linux-ARM64-VST3.zip" \
               "$(basename "$VST3")")

      - name: Upload Standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-ARM64-Standalone-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: ${{ steps.find.outputs.exe }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-ARM64-AppImage-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: NeuralStage-${{ steps.date.outputs.date }}-aarch64.AppImage
          retention-days: 30
          if-no-files-found: warn

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralStage-Linux-ARM64-VST3-${{ steps.date.outputs.date }}-r${{ github.run_number }}
          path: ${{ steps.find.outputs.vst3 }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload release zips artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-zips-arm64
          path: zips/
          retention-days: 7

  # ============================================================================
  #  Create GitHub Release (tag pushes only)
  #  Runs after both build jobs finish. Collects the Linux zips and creates
  #  a draft release so the Windows builds can be added before publishing.
  # ============================================================================
  release:
    name: Create GitHub Release
    needs: [build-x86_64, build-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download x86_64 release zips
        uses: actions/download-artifact@v4
        with:
          name: release-zips-x86_64
          path: release-assets/

      - name: Download ARM64 release zips
        uses: actions/download-artifact@v4
        with:
          name: release-zips-arm64
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*.zip
          body: |
            ## NeuralStage ${{ github.ref_name }}

            See assets below for all platforms. Windows builds are added by the
            separate Windows CI job — publish the draft once all jobs complete.

            _Full changelog: [CHANGELOG.md](CHANGELOG.md)_
